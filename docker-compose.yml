version: "3.9"

services:

  agent:
    build: ./app/agent
    container_name: foundryops-agent
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data

  platform_api:
    image: python:3.11-slim
    container_name: foundryops-api
    working_dir: /app
    volumes:
      - ./app/api:/app
    command: >
      sh -c "pip install fastapi uvicorn requests &&
             uvicorn platform_api:app --host 0.0.0.0 --port 9000"
    ports:
      - "9000:9000"
    depends_on:
      - agent
